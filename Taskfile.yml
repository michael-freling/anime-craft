version: '3'

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml

vars:
  APP_NAME: "anime-craft"
  BIN_DIR: "bin"
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  lineart:model:
    desc: Download Anime2Sketch weights and convert to ONNX
    dir: inference/lineart
    status:
      - test -f anime2sketch.onnx
    cmds:
      - pdm install
      - pdm run convert

  lineart:onnxruntime:windows:
    desc: Download ONNX Runtime shared library for Windows
    status:
      - test -f onnxruntime/lib/onnxruntime.dll
    cmds:
      - mkdir -p onnxruntime
      - curl -L -o /tmp/onnxruntime-win.zip "https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-win-x64-1.24.4.zip"
      - unzip -o /tmp/onnxruntime-win.zip -d /tmp/onnxruntime-win
      - cp -r /tmp/onnxruntime-win/onnxruntime-win-x64-1.24.4/lib onnxruntime/
      - cp -r /tmp/onnxruntime-win/onnxruntime-win-x64-1.24.4/include onnxruntime/
      - rm -rf /tmp/onnxruntime-win /tmp/onnxruntime-win.zip

  lineart:onnxruntime:linux:
    desc: Download ONNX Runtime shared library for Linux
    status:
      - test -f onnxruntime/lib/libonnxruntime.so
    cmds:
      - mkdir -p onnxruntime
      - curl -L -o /tmp/onnxruntime-linux.tgz "https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-linux-x64-1.24.4.tgz"
      - tar xzf /tmp/onnxruntime-linux.tgz -C /tmp
      - cp -r /tmp/onnxruntime-linux-x64-1.24.4/lib onnxruntime/
      - cp -r /tmp/onnxruntime-linux-x64-1.24.4/include onnxruntime/
      - rm -rf /tmp/onnxruntime-linux-x64-1.24.4 /tmp/onnxruntime-linux.tgz

  lineart:setup:wsl:
    desc: Set up line art extraction for WSL->Windows
    deps:
      - lineart:model
      - lineart:onnxruntime:windows

  lineart:setup:linux:
    desc: Set up line art extraction for Linux
    deps:
      - lineart:model
      - lineart:onnxruntime:linux

  dev:
    summary: Runs the application in development mode
    deps:
      - lineart:setup:linux
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  e2e:
    desc: Run E2E tests with AT-SPI
    cmds:
      - go build -cover -o anime-craft ./gateway/cmd/anime-craft
      - mkdir -p /tmp/gocoverdir
      - dbus-run-session -- xvfb-run -a env GOCOVERDIR=/tmp/gocoverdir GTK_MODULES=gail:atk-bridge python3 -m pytest e2e/ -v --tb=short

  e2e:playwright:
    desc: Run Playwright e2e tests (requires dev server running)
    dir: e2e
    cmds:
      - npx playwright test

  e2e:debug:
    desc: Run debug smoke test and capture diagnostics to /tmp/anime-craft-e2e/
    dir: e2e
    cmds:
      - npx playwright test tests/debug-smoke.spec.ts
      - echo "Diagnostics saved to /tmp/anime-craft-e2e/"
      - echo "  feedback-page.png  - screenshot of the feedback page"
      - echo "  console.log        - browser console output"
      - echo "  backend-debug.log  - backend structured log"

  inference:install:
    desc: Install Python inference service dependencies
    dir: inference
    status:
      - test -d .venv
    cmds:
      - pdm install

  inference:protoc:
    desc: Generate protobuf code for Python
    deps:
      - inference:install
    dir: inference
    cmds:
      - mkdir -p src/animecraft_inference/generated
      - pdm run protoc

  inference:serve:
    desc: Start the Python inference service
    dir: inference
    deps:
      - inference:install
      - inference:protoc
    cmds:
      - pdm run serve

  run:wsl:
    desc: Run the staged Windows exe from WSL with env vars set
    vars:
      WIN_DEV_DIR: /mnt/c/temp/anime-craft-dev
      VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'
      INFERENCE_PORT: 50051
    cmds:
      - cmd: >-
          FRONTEND_DEVSERVER_URL=http://localhost:{{.VITE_PORT}}
          INFERENCE_SERVICE_ADDR=localhost:{{.INFERENCE_PORT}}
          {{.WIN_DEV_DIR}}/anime-craft.exe

  dev:wsl:
    summary: Cross-compile Windows exe and start Vite dev server for WSL→Windows development
    deps:
      - common:install:frontend:deps
      - lineart:setup:wsl
      - inference:install
      - inference:protoc
    vars:
      WIN_DEV_DIR: /mnt/c/temp/anime-craft-dev
      INFERENCE_PORT: 50051
    silent: true
    cmds:
      - wails3 generate bindings ./gateway/cmd/anime-craft || true
      - CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc GOOS=windows GOARCH=amd64 go build -tags dev -o anime-craft.exe ./gateway/cmd/anime-craft
      # Stage exe and runtime files to a local Windows directory so the app
      # doesn't load DLLs or models from UNC paths (which can fail on Windows).
      - mkdir -p {{.WIN_DEV_DIR}}/onnxruntime/lib {{.WIN_DEV_DIR}}/inference/lineart
      - cp anime-craft.exe {{.WIN_DEV_DIR}}/
      - cp -u onnxruntime/lib/*.dll {{.WIN_DEV_DIR}}/onnxruntime/lib/
      - cmd: cp -u inference/lineart/anime2sketch.onnx {{.WIN_DEV_DIR}}/inference/lineart/
        ignore_error: true
      # Start the Python inference service in the background.
      - cmd: cd inference && pdm run serve --port {{.INFERENCE_PORT}} &
        ignore_error: true
      - |
        echo ""
        echo "Build complete. Inference service starting on port {{.INFERENCE_PORT}}."
        echo "Starting Vite dev server and app..."
        echo ""
      # Start Vite in the background, then launch the exe from WSL.
      - cmd: cd frontend && npm run dev -- --host 0.0.0.0 --port {{.VITE_PORT}} &
      - sleep 3
      - task: run:wsl
