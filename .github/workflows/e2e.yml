name: E2E
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read Go version
        id: go-version
        run: echo "version=$(grep '^go ' go.mod | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go-version.outputs.version }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            at-spi2-core dbus-x11 xvfb \
            python3-gi python3-pip
          pip3 install --break-system-packages dogtail pytest
      - name: Generate Wails bindings
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.11
          wails3 generate bindings -clean=true -ts
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Create frontend dist
        run: |
          cd frontend && npm ci && npm run build
      - name: Build app with coverage
        run: go build -cover -o anime-craft .
      - name: Run E2E tests
        run: |
          mkdir -p /tmp/gocoverdir
          dbus-run-session -- xvfb-run -a \
            env GOCOVERDIR=/tmp/gocoverdir GTK_MODULES=gail:atk-bridge \
            python3 -m pytest e2e/ -v --tb=long -s 2>&1
      - name: Dump AT-SPI tree on failure
        if: failure()
        run: |
          cat > /tmp/dump_tree.py << 'PYEOF'
          import gi
          gi.require_version("Atspi", "2.0")
          from gi.repository import Atspi
          import time, sys
          def dump(node, indent=0):
              try:
                  role = node.get_role_name()
                  name = node.get_name()
                  action = node.get_action_iface()
                  n_actions = action.get_n_actions() if action else 0
                  print(f"{'  '*indent}{role}: '{name}' (actions={n_actions})")
              except Exception as e:
                  print(f"{'  '*indent}[error: {e}]")
                  return
              if indent > 8:
                  return
              for i in range(node.get_child_count()):
                  child = node.get_child_at_index(i)
                  if child:
                      dump(child, indent + 1)
          desktop = Atspi.get_desktop(0)
          for i in range(desktop.get_child_count()):
              child = desktop.get_child_at_index(i)
              if child and child.get_name() == "anime-craft":
                  dump(child)
                  sys.exit(0)
          print("App not found in AT-SPI tree")
          PYEOF
          dbus-run-session -- xvfb-run -a \
            env GTK_MODULES=gail:atk-bridge \
            timeout 30 python3 /tmp/dump_tree.py 2>/dev/null || echo "Tree dump failed (app may have exited)"
      - name: Collect Go coverage
        if: always()
        run: |
          if [ -d /tmp/gocoverdir ] && [ "$(ls -A /tmp/gocoverdir)" ]; then
            go tool covdata textfmt -i=/tmp/gocoverdir -o=e2e-coverage.out
            go tool cover -func=e2e-coverage.out | tail -1
          fi
