name: E2E
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read Go version
        id: go-version
        run: echo "version=$(grep '^go ' go.mod | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go-version.outputs.version }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            at-spi2-core dbus-x11 xvfb \
            python3-gi python3-pip
          pip3 install --break-system-packages dogtail pytest
      - name: Generate Wails bindings
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.11
          wails3 generate bindings -clean=true -ts
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Create frontend dist
        run: |
          cd frontend && npm ci && npm run build
      - name: Build app with coverage
        run: go build -cover -o anime-craft .
      - name: Run AT-SPI accessibility tests
        run: |
          mkdir -p /tmp/gocoverdir
          dbus-run-session -- xvfb-run -a \
            env GOCOVERDIR=/tmp/gocoverdir GTK_MODULES=gail:atk-bridge \
            python3 -m pytest e2e/ -v --tb=short
      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright flow tests
        run: |
          # Start virtual display for the native Wails window
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 1
          export DISPLAY=:99
          cd e2e && npx playwright test --reporter=list 2>&1
        timeout-minutes: 5
      - name: Upload Playwright results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: e2e/test-results/
      - name: Collect Go coverage
        if: always()
        run: |
          if [ -d /tmp/gocoverdir ] && [ "$(ls -A /tmp/gocoverdir)" ]; then
            go tool covdata textfmt -i=/tmp/gocoverdir -o=e2e-coverage.out
            go tool cover -func=e2e-coverage.out | tail -1
          fi
